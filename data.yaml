# YOLO-format dataset config (Ultralytics)
#
# No `path` key is set on purpose: Ultralytics then defaults the dataset root
# to this YAML file's own directory (the repo root), so `train`/`val` below
# resolve as repo-root-relative paths regardless of the current working
# directory.
#
# `train`/`val` point to file-list .txt files (not directories) because all
# frames from the 4 training videos live together in a single
# data/labels/train/images/ folder. The .txt files are (re)generated by
# scripts/train.py::build_train_val_split() from the images present at
# training time, using a per-video temporal holdout (see that function's
# docstring for the rationale).

train: data/labels/train/train.txt
val: data/labels/train/val.txt

# Single merged class per section 2 of the task
nc: 1
names:
  0: vehicle
